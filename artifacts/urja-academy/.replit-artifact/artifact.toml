kind = "web"
previewPath = "/"
title = "URJA Training Academy"
version = "1.0.0"
id = "artifacts/urja-academy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24472

[services.development]
run = "pnpm --filter @workspace/urja-academy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/urja-academy", "run", "build" ]
publicDir = "artifacts/urja-academy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24472"
BASE_PATH = "/"
